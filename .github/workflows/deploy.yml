name: Deploy to S3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history
    
    - name: Debug - List files
      run: |
        echo "Current directory: $(pwd)"
        echo "Files in root:"
        ls -la
        echo "Checking for package-lock.json:"
        if [ -f package-lock.json ]; then
          echo "✅ package-lock.json found!"
          head -5 package-lock.json
        else
          echo "❌ package-lock.json NOT found"
          find . -name "package-lock.json"
        fi
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './package-lock.json'  # Explicitly specify path
    
    - name: Clear npm cache (fix for cache issues)
      run: |
        npm cache clean --force
        rm -rf node_modules
    
    - name: Install dependencies
      run: npm ci
      continue-on-error: false
    
    - name: Build
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
    
    - name: Deploy to S3
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    
    - name: Sync to S3
      run: |
        aws s3 sync dist/ s3://luna-stylist --delete
    
    - name: Invalidate CloudFront (if using)
      if: ${{ secrets.CLOUDFRONT_DIST_ID != '' }}
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"
