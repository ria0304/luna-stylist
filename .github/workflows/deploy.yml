name: Deploy to AWS
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify package-lock.json exists
        run: |
          if [ -f "package-lock.json" ]; then
            echo "✓ package-lock.json found"
          else
            echo "✗ package-lock.json missing"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build
        run: npm run build
        env:
          VITE_WYA_API_URL: ${{ secrets.VITE_WYA_API_URL }}
          VITE_LUNA_API_URL: ${{ secrets.VITE_LUNA_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Sync to S3
        run: aws s3 sync dist/ s3://luna-stylist --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.LUNA_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Luna server to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: OPENROUTER_API_KEY
          script: |
            cd ~/luna-stylist
            git pull origin main

            # Inject secrets into luna.env (preserve existing vars, upsert the key)
            touch ~/luna.env
            grep -v "^OPENROUTER_API_KEY=" ~/luna.env > ~/luna.env.tmp || true
            echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" >> ~/luna.env.tmp
            mv ~/luna.env.tmp ~/luna.env

            docker build -t luna-server ./server
            docker stop luna || true
            docker rm luna || true
            docker run -d \
              --name luna \
              --restart unless-stopped \
              -p 8001:8001 \
              --env-file ~/luna.env \
              luna-server
